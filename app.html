<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#00c9a7">
  <title>Registro de Refeições · CECAN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .app-layout {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden; /* FIX: impede scroll horizontal */
    }

    .app-body {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box; /* FIX: inclui padding no width */
    }

    /* ── Topo com data e stats ───────────────────────────── */
    .day-header {
      background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap; /* FIX: não quebra em mobile */
    }

    .day-info h2 { font-size: .95rem; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
    .day-info p  { font-size: .78rem; color: var(--text-3); }

    .stats-mini { display: flex; gap: 6px; flex-shrink: 0; }

    .stat-mini {
      background: var(--bg-0);
      border: 1px solid var(--border-sub);
      border-radius: var(--radius);
      padding: 7px 10px;
      text-align: center;
      min-width: 52px;
    }

    .stat-mini .n {
      font-family: var(--font-head);
      font-size: 1.3rem;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
    }

    .stat-mini.marked .n  { color: var(--success); }
    .stat-mini.pending .n { color: var(--warning); }

    .stat-mini .l {
      font-size: .6rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-top: 2px;
    }

    /* ── Busca ───────────────────────────────────────────── */
    .search-section { display: flex; gap: 10px; align-items: center; }
    .search-section .search-wrap { flex: 1; }

    /* ── Toolbar da lista ────────────────────────────────── */
    .list-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btns { display: flex; gap: 5px; flex-wrap: wrap; }

    .filter-btn {
      background: var(--bg-2);
      border: 1px solid var(--border-sub);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all var(--t);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--border);
      color: var(--accent);
    }

    .filter-count {
      background: var(--bg-0);
      border-radius: 99px;
      padding: 0 5px;
      font-size: .7rem;
      min-width: 18px;
      text-align: center;
    }

    /* ── Botão de desmarcar ──────────────────────────────── */
    .btn-unmark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--danger);
      background: var(--danger-dim);
      color: var(--danger);
      cursor: pointer;
      font-size: .85rem;
      display: grid;
      place-items: center;
      transition: all var(--t);
      flex-shrink: 0;
    }

    .btn-unmark:hover {
      background: var(--danger);
      color: white;
    }

    .hist-btn {
      height: 34px;
      font-size: .78rem;
    }

    /* ── Scroll da lista ─────────────────────────────────── */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 88px;
    }

    /* ── Responsividade mobile ───────────────────────────── */
    @media (max-width: 480px) {
      .app-body { padding: 10px 12px; gap: 10px; }

      .day-header { padding: 12px 14px; }
      .day-info h2 { font-size: .88rem; }

      .stat-mini { padding: 6px 8px; min-width: 46px; }
      .stat-mini .n { font-size: 1.15rem; }
      .stat-mini .l { font-size: .55rem; }

      .topbar { padding: 0 12px; }
      .topbar-brand h1 { font-size: .95rem; }
      .topbar-brand span { display: none; }
    }
  </style>
</head>

<body>
<div class="app-layout">

  <!-- ── Topbar ──────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-brand">
      <div class="logo-mark">🍽</div>
      <div>
        <h1>Registro de Refeições</h1>
        <span>CECAN · Liga Contra o Câncer</span>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="theme-toggle" id="theme-toggle" title="Alternar tema" aria-label="Alternar tema"></button>
      <a href="admin.html" class="btn btn-ghost btn-icon" title="Painel Admin">⚙</a>
      <button class="btn btn-ghost btn-icon" id="logout-btn" title="Sair">↩</button>
    </div>
  </header>

  <!-- ── Corpo principal ─────────────────────────────────── -->
  <main class="app-body page-enter">

    <!-- Cabeçalho do dia -->
    <div class="day-header">
      <div class="day-info">
        <h2>🍴 Almoço de hoje</h2>
        <p id="today-label">Carregando...</p>
      </div>
      <div class="stats-mini">
        <div class="stat-mini">
          <div class="n" id="stat-total">–</div>
          <div class="l">Total</div>
        </div>
        <div class="stat-mini marked">
          <div class="n" id="stat-marked">–</div>
          <div class="l">Marcados</div>
        </div>
        <div class="stat-mini pending">
          <div class="n" id="stat-pending">–</div>
          <div class="l">Pendentes</div>
        </div>
      </div>
    </div>

    <!-- Busca -->
    <div class="search-section">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input
          class="search-input"
          type="search"
          id="search"
          placeholder="Buscar por nome ou matrícula..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          inputmode="search"
        >
        <button class="search-clear" id="search-clear" aria-label="Limpar busca">✕</button>
      </div>
    </div>

    <!-- Toolbar da lista -->
    <div class="list-toolbar">
      <span class="list-count" id="list-count">Carregando...</span>
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all">
          Todos <span class="filter-count" id="fc-all">–</span>
        </button>
        <button class="filter-btn" data-filter="pending">
          Pendentes <span class="filter-count" id="fc-pending">–</span>
        </button>
        <button class="filter-btn" data-filter="marked">
          Marcados <span class="filter-count" id="fc-marked">–</span>
        </button>
      </div>
    </div>

    <!-- Lista de funcionários -->
    <div class="list-scroll">
      <div class="emp-list" id="emp-list">
        <div class="loading-spinner"></div>
      </div>
    </div>

  </main>
</div>

<!-- ── FAB: Scanner QR ──────────────────────────────────── -->
<button class="fab" id="fab-qr" title="Escanear QR Code" aria-label="Escanear QR Code">
  <span>▣</span>
  <span class="fab-label">Escanear QR Code</span>
</button>

<!-- ── Modal: Histórico ────────────────────────────────── -->
<div class="modal-overlay" id="history-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h3 id="history-name">Histórico</h3>
      <span id="history-count" class="badge badge-accent" style="margin-left:auto"></span>
      <button class="btn btn-ghost btn-icon" onclick="document.getElementById('history-modal').classList.remove('open')" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-body" id="history-body" style="max-height:340px;overflow-y:auto">
      <div class="loading-spinner"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('history-modal').classList.remove('open')">Fechar</button>
    </div>
  </div>
</div>

<!-- ── Modal: QR Scanner ────────────────────────────────── -->
<div class="modal-overlay" id="qr-modal" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>📷 Escanear QR Code</h3>
      <button class="btn btn-ghost btn-icon" id="close-qr" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:.85rem;color:var(--text-2);margin-bottom:14px">
        Aponte a câmera do tablet para o crachá do funcionário.
      </p>
      <div id="reader" style="width:100%"></div>
      <p id="qr-result" style="text-align:center;font-size:.85rem;color:var(--text-3);margin-top:12px">
        Aguardando leitura...
      </p>
    </div>
  </div>
</div>

<!-- ── Toast container ──────────────────────────────────── -->
<div class="toast-container" id="toast-container"></div>

<!-- ── Firebase ─────────────────────────────────────────── -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- ── QR Scanner ───────────────────────────────────────── -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<!-- ── App scripts ──────────────────────────────────────── -->
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/database.js"></script>

<script>
  auth.onAuthStateChanged(user => {
    if (!user) window.location.href = 'index.html';
  });
</script>

<script src="js/daily.js"></script>
</body>
</html>
