<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="Sistema de Controle de Refeições — Liga Contra o Câncer">
  <meta name="theme-color" content="#00c9a7">
  <title>Login — Controle de Refeições · CECAN</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-form { display: flex; flex-direction: column; gap: 18px; }
    .login-btn { height: 54px; font-size: 1.05rem; }
    .login-divider { display: flex; align-items: center; gap: 10px; color: var(--text-3); font-size: .82rem; margin: 4px 0; }
    .login-divider::before, .login-divider::after { content:''; flex:1; height:1px; background:var(--border-sub); }
    .login-error { background: var(--danger-dim); border: 1px solid var(--danger); border-radius: var(--radius); padding: 10px 14px; font-size: .88rem; color: var(--danger); display: none; }
    .login-error.visible { display: block; }
    .version { font-size: .72rem; color: var(--text-3); text-align: center; margin-top: 20px; font-family: var(--font-mono); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .pw-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-3); font-size:1.1rem; padding:4px; }
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-mark">🍽</div>
      <div>
        <h1>Controle de Refeições</h1>
        <p>Liga Contra o Câncer · CECAN</p>
      </div>
    </div>

    <div id="login-error" class="login-error" role="alert"></div>

    <form class="login-form" id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <div class="pw-wrap">
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="username"
            inputmode="email"
            required
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <div class="pw-wrap">
          <input
            class="form-input"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Mostrar senha">
            👁
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block login-btn" id="login-btn">
        <span id="btn-text">Entrar no Sistema</span>
      </button>

    </form>

    <div class="login-divider">acesso restrito</div>

    <p style="text-align:center;font-size:.8rem;color:var(--text-3)">
      Apenas colaboradores autorizados. Para solicitar acesso, contate o administrador do sistema.
    </p>

    <div class="version">v1.0 · Sistema de Controle de Refeições Hospitalares</div>

    <!-- Toggle tema -->
    <div style="display:flex;justify-content:center;margin-top:16px;gap:8px;align-items:center">
      <span style="font-size:.78rem;color:var(--text-3)">🌙</span>
      <button class="theme-toggle" id="theme-toggle" title="Alternar tema" aria-label="Alternar tema"></button>
      <span style="font-size:.78rem;color:var(--text-3)">☀️</span>
    </div>

  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>

<script>
  // Tema
  const savedTheme = localStorage.getItem('liga-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('liga-theme', next);
  });

  // Toggle mostrar senha
  document.getElementById('pw-toggle').addEventListener('click', function() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.textContent = pw.type === 'password' ? '👁' : '🙈';
  });

  // Login
  document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');
    const btnText  = document.getElementById('btn-text');

    errEl.classList.remove('visible');
    btn.disabled = true;
    btnText.textContent = 'Entrando...';

    const result = await Auth.login(email, password);

    if (result.ok) {
      btnText.textContent = '✓ Autenticado!';
      setTimeout(() => { window.location.href = 'app.html'; }, 300);
    } else {
      errEl.textContent = result.error;
      errEl.classList.add('visible');
      btn.disabled = false;
      btnText.textContent = 'Entrar no Sistema';
      document.getElementById('password').focus();
    }
  });

  // Redirect se já logado
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'app.html';
  });
</script>
</body>
</html>
